<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#ff7ab8" />
<title>티니핑 이름 맞히기 🎀</title>
<style>
  /* =========================
     Reset & Base
     ========================= */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: #4a2a4a;
    background: linear-gradient(160deg, #ffd6ec 0%, #fff5d6 40%, #d6f0ff 80%, #e7d6ff 100%);
    background-attachment: fixed;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Floating pastel blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.45;
    z-index: 0;
  }
  body::before {
    width: 220px; height: 220px;
    background: #ffb6dc;
    top: -60px; left: -40px;
    animation: float1 9s ease-in-out infinite;
  }
  body::after {
    width: 260px; height: 260px;
    background: #b6e6ff;
    bottom: -80px; right: -60px;
    animation: float2 11s ease-in-out infinite;
  }
  @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px, 30px); } }
  @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-25px, -20px); } }

  /* =========================
     App Layout
     ========================= */
  #app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    display: flex;
    flex-direction: column;
  }

  .screen {
    display: none;
    flex: 1;
    flex-direction: column;
    padding: 12px 0 16px;
  }
  .screen.active { display: flex; animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }

  /* =========================
     Start Screen
     ========================= */
  .start-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 20px;
    padding: 20px 8px;
  }
  .logo {
    font-size: 38px;
    font-weight: 900;
    background: linear-gradient(90deg, #ff5fa2, #ffae34, #6ec8ff, #b675ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    line-height: 1.2;
    letter-spacing: -0.02em;
  }
  .logo .emoji { -webkit-background-clip: initial; background-clip: initial; color: initial; }
  .subtitle {
    color: #6b4368;
    font-size: 17px;
    line-height: 1.6;
    max-width: 320px;
  }
  .start-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.9);
    border-radius: 24px;
    padding: 18px 18px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 12px 30px rgba(255, 122, 184, 0.18);
  }
  .start-card .rules {
    text-align: left;
    font-size: 14px;
    color: #5b3a59;
    line-height: 1.8;
    margin: 4px 0 12px;
  }
  .start-card .rules b { color: #ff4f99; }

  .btn {
    appearance: none;
    border: none;
    cursor: pointer;
    font: inherit;
    font-weight: 800;
    border-radius: 999px;
    padding: 16px 24px;
    font-size: 19px;
    color: white;
    background: linear-gradient(135deg, #ff6ab0 0%, #ff8a3d 100%);
    box-shadow: 0 8px 18px rgba(255, 92, 158, 0.35), inset 0 -3px 0 rgba(0,0,0,0.08);
    transition: transform .12s ease, box-shadow .12s ease;
    touch-action: manipulation;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(255, 92, 158, 0.25); }
  .btn.secondary {
    background: linear-gradient(135deg, #82b6ff 0%, #b27dff 100%);
    box-shadow: 0 8px 18px rgba(130, 110, 255, 0.3), inset 0 -3px 0 rgba(0,0,0,0.08);
  }
  .btn.ghost {
    background: rgba(255,255,255,0.7);
    color: #884a78;
    box-shadow: inset 0 0 0 2px rgba(255,150,200,0.5);
  }

  /* =========================
     Quiz Screen
     ========================= */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .progress-text {
    font-weight: 800;
    color: #ff4f99;
    font-size: 17px;
  }
  .score-chip {
    background: white;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 15px;
    font-weight: 700;
    color: #6b4368;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  .progress-bar {
    height: 8px;
    background: rgba(255,255,255,0.7);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6ab0, #ffae34, #6ec8ff);
    transition: width .4s ease;
  }

  .image-card {
    position: relative;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 320px;
    margin: 0 auto 16px;
    border-radius: 28px;
    background: rgba(255,255,255,0.85);
    border: 3px solid white;
    box-shadow: 0 16px 32px rgba(180, 110, 200, 0.18);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .image-card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 14px;
    pointer-events: none;
    -webkit-user-drag: none;
  }
  .image-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--c1, #ffc8e0), var(--c2, #c8e7ff));
    font-size: 96px;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 4px 0 rgba(0,0,0,0.08);
  }

  .question-text {
    text-align: center;
    font-size: 19px;
    font-weight: 700;
    color: #5b3a59;
    margin-bottom: 14px;
  }
  .question-text b { color: #ff4f99; }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 8px;
  }
  .option-btn {
    appearance: none;
    border: none;
    cursor: pointer;
    font: inherit;
    background: white;
    border-radius: 18px;
    padding: 16px 8px;
    font-weight: 800;
    font-size: 18px;
    color: #4a2a4a;
    box-shadow: 0 4px 0 rgba(255, 122, 184, 0.25), 0 6px 14px rgba(0,0,0,0.05);
    transition: transform .1s ease, box-shadow .1s ease, background .2s ease, color .2s ease;
    min-height: 60px;
    touch-action: manipulation;
    border: 2px solid rgba(255,255,255,0.9);
  }
  .option-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(255, 122, 184, 0.25); }
  .option-btn.correct {
    background: linear-gradient(135deg, #6ee7a3, #34d399);
    color: white;
    box-shadow: 0 4px 0 #16a34a, 0 0 0 4px rgba(110, 231, 163, 0.35);
    animation: bounce .5s ease;
  }
  .option-btn.wrong {
    background: linear-gradient(135deg, #ff8a8a, #ff5c5c);
    color: white;
    box-shadow: 0 4px 0 #c53030;
    animation: shake .45s ease;
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.dimmed { opacity: 0.5; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px) scale(1.05); }
    60% { transform: translateY(0) scale(0.98); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* Feedback Overlay */
  .feedback {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }
  .feedback.show { opacity: 1; animation: feedbackPop .9s ease forwards; }
  @keyframes feedbackPop {
    0% { opacity: 0; transform: scale(0.6); }
    20% { opacity: 1; transform: scale(1.1); }
    50% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1); }
  }
  .feedback-bubble {
    font-size: 100px;
    font-weight: 900;
    text-shadow: 0 6px 0 rgba(0,0,0,0.1), 0 12px 24px rgba(0,0,0,0.2);
  }
  .feedback.correct .feedback-bubble { color: #22c55e; }
  .feedback.wrong .feedback-bubble { color: #ef4444; }

  .answer-reveal {
    text-align: center;
    margin-top: 8px;
    font-weight: 800;
    font-size: 17px;
    min-height: 24px;
    color: #5b3a59;
  }
  .answer-reveal.correct { color: #16a34a; }
  .answer-reveal.wrong { color: #ef4444; }

  .next-btn-wrap {
    display: flex;
    justify-content: center;
    margin-top: 12px;
    min-height: 50px;
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 15;
  }

  /* =========================
     Result Screen
     ========================= */
  .result-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 12px 4px 24px;
    gap: 14px;
  }
  .result-title {
    font-size: 34px;
    font-weight: 900;
    background: linear-gradient(90deg, #ff5fa2, #ffae34, #6ec8ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .result-emoji { font-size: 64px; }
  .result-score {
    font-size: 26px;
    font-weight: 800;
    color: #4a2a4a;
  }
  .result-score .big {
    font-size: 56px;
    background: linear-gradient(90deg, #ff5fa2, #ffae34);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .result-comment {
    font-size: 17px;
    color: #6b4368;
    line-height: 1.6;
    max-width: 320px;
  }
  .result-actions {
    display: flex;
    gap: 8px;
    flex-direction: column;
    width: 100%;
    max-width: 320px;
    margin-top: 8px;
  }

  /* 하츄핑 + 말풍선 */
  .hatchu-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    width: 100%;
    max-width: 360px;
    margin: 8px 0 4px;
  }
  .hatchu-img {
    width: 110px;
    height: 110px;
    object-fit: contain;
    flex-shrink: 0;
    animation: hatchuBob 2.4s ease-in-out infinite;
    filter: drop-shadow(0 6px 12px rgba(255,122,184,0.25));
  }
  @keyframes hatchuBob {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-6px) rotate(2deg); }
  }
  .speech-bubble {
    position: relative;
    flex: 1;
    background: white;
    border: 3px solid #ff9ec7;
    border-radius: 20px 20px 20px 4px;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 700;
    color: #4a2a4a;
    line-height: 1.55;
    text-align: left;
    box-shadow: 0 8px 18px rgba(255,122,184,0.18);
    animation: bubblePop .5s ease both;
    animation-delay: .15s;
    transform-origin: bottom left;
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    left: -14px;
    bottom: 10px;
    width: 0; height: 0;
    border-style: solid;
    border-width: 8px 14px 8px 0;
    border-color: transparent #ff9ec7 transparent transparent;
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    left: -10px;
    bottom: 12px;
    width: 0; height: 0;
    border-style: solid;
    border-width: 6px 11px 6px 0;
    border-color: transparent white transparent transparent;
  }
  @keyframes bubblePop {
    0%   { opacity: 0; transform: scale(0.6); }
    60%  { opacity: 1; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  .review-list {
    width: 100%;
    max-width: 360px;
    background: rgba(255,255,255,0.75);
    border-radius: 18px;
    padding: 12px;
    margin-top: 6px;
    max-height: 280px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .review-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 6px;
    border-bottom: 1px dashed rgba(180, 110, 200, 0.2);
    font-size: 16px;
    text-align: left;
  }
  .review-row:last-child { border-bottom: none; }
  .review-row .num { width: 32px; font-weight: 800; color: #ff4f99; font-size: 15px; }
  .review-row .mark { width: 26px; text-align: center; font-size: 18px; }
  .review-row .name { flex: 1; font-weight: 700; color: #4a2a4a; }
  .review-row .yours {
    font-size: 14px;
    color: #6b4368;
    background: rgba(255,255,255,0.7);
    padding: 3px 10px;
    border-radius: 999px;
  }
  .review-row .yours.wrong { color: #ef4444; }

  .footer-tip {
    margin-top: 16px;
    font-size: 12px;
    color: #8a6488;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="app">

  <!-- ========== START SCREEN ========== -->
  <section id="screen-start" class="screen active">
    <div class="start-wrap">
      <img id="titleImg" src="./images/title.webp" alt="티니핑 퀴즈"
           style="max-width:340px;width:90%;height:auto;display:block;margin:0 auto 24px;filter:drop-shadow(0 8px 20px rgba(255,122,184,0.3));"
           onerror="this.style.display='none'" />
      <button id="startBtn" class="btn" style="min-width:200px;">시작하기 🚀</button>
      <span id="startTotal" style="display:none;">30</span>
    </div>
  </section>

  <!-- ========== QUIZ SCREEN ========== -->
  <section id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="progress-text"><span id="qNum">1</span> / <span id="qTotal">30</span></div>
      <div class="score-chip">⭐ <span id="scoreNow">0</span>점</div>
    </div>
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>

    <div class="image-card" id="imageCard">
      <div class="image-fallback" id="imageFallback">?</div>
      <img id="charImg" alt="티니핑" />
    </div>

    <div class="question-text">이 친구는 누구인 <b>티니핑</b>일까요?</div>

    <div class="options-grid" id="optionsGrid"></div>

    <div class="answer-reveal" id="answerReveal"></div>
    <div class="next-btn-wrap" id="nextBtnWrap"></div>
  </section>

  <!-- ========== RESULT SCREEN ========== -->
  <section id="screen-result" class="screen">
    <div class="result-wrap">
      <div class="result-title">퀴즈 끝!</div>
      <div class="result-score"><span class="big" id="finalScore">0</span> <span style="font-size:20px;">/ <span id="finalTotal">30</span></span></div>

      <div class="hatchu-row">
        <img id="hatchuImg" class="hatchu-img" src="./images/result.png" alt="하츄핑"
             onerror="this.style.display='none'" />
        <div class="speech-bubble" id="hatchuMessage"></div>
      </div>

      <div class="result-actions">
        <button id="restartBtn" class="btn">한 번 더! 🔁</button>
        <button id="showReviewBtn" class="btn secondary">결과 자세히 보기 📋</button>
      </div>

      <div id="reviewList" class="review-list" style="display:none;"></div>
    </div>
  </section>

</div>

<canvas id="confetti-canvas"></canvas>

<!-- mapping.js가 있으면 window.MAPPING으로 자동 로드됨 (label.html에서 생성) -->
<script src="mapping.js" onerror="console.log('mapping.js 없음 - label.html에서 라벨링 후 생성하세요')"></script>

// ====== 유틸 ======
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickN(arr, n) { return shuffle(arr).slice(0, n); }

// ====== 사운드 (Web Audio API) ======
let audioCtx = null;
function getCtx() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, duration = 0.15, type = 'sine', gain = 0.08, when = 0) {
  if (!soundOn) return;
  const ctx = getCtx();
  if (!ctx) return;
  const t = ctx.currentTime + when;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  osc.connect(g).connect(ctx.destination);
  osc.start(t);
  osc.stop(t + duration + 0.02);
}
function playCorrect() {
  // 밝은 상행 아르페지오
  tone(523.25, 0.12, 'triangle', 0.1, 0);     // C5
  tone(659.25, 0.12, 'triangle', 0.1, 0.08);  // E5
  tone(783.99, 0.18, 'triangle', 0.1, 0.16);  // G5
  tone(1046.5, 0.22, 'triangle', 0.1, 0.24);  // C6
}
function playWrong() {
  tone(311.13, 0.18, 'sawtooth', 0.06, 0);    // Eb4
  tone(233.08, 0.28, 'sawtooth', 0.06, 0.12); // Bb3
}
function playClick() { tone(900, 0.05, 'square', 0.04); }
function playFanfare() {
  const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
  notes.forEach((f, i) => tone(f, 0.18, 'triangle', 0.09, i * 0.1));
  setTimeout(() => {
    tone(1046.5, 0.25, 'triangle', 0.1, 0);
    tone(1318.5, 0.25, 'triangle', 0.1, 0);
    tone(1568, 0.4, 'triangle', 0.1, 0);
  }, 600);
}

// ====== 진동 ======
function vibrate(pattern) {
  if (navigator.vibrate) try { navigator.vibrate(pattern); } catch(e) {}
}

// ====== 화면 전환 ======
function showScreen(name) {
  [screenStart, screenQuiz, screenResult].forEach(s => s.classList.remove('active'));
  ({ start: screenStart, quiz: screenQuiz, result: screenResult })[name].classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ====== 게임 시작 ======
function startGame() {
  // mapping.json에 등록된 캐릭터만 정답으로 선정 (이미지 있는 것만)
  const mappedNames = Object.keys(nameToFile);
  const pool = mappedNames.length > 0
    ? TINIPINGS.filter(t => mappedNames.includes(t.name))
    : TINIPINGS; // 매핑이 없으면 전체 사용 (fallback 카드 표시됨)

  if (pool.length < OPTION_COUNT) {
    alert(`매핑된 캐릭터가 너무 적어요 (${pool.length}개).\nlabel.html에서 라벨링을 더 진행하거나, 이미지 없이 플레이하려면 mapping.json을 비워두세요.`);
    return;
  }

  const totalQ = Math.min(TOTAL_QUESTIONS, pool.length);
  const picked = pickN(pool, totalQ);

  questions = picked.map(answer => {
    // 오답 후보도 매핑된 캐릭터 풀에서만 뽑음
    const distractors = pickN(
      pool.filter(t => t.name !== answer.name),
      OPTION_COUNT - 1
    );
    const options = shuffle([answer, ...distractors]);
    return {
      answer,
      options,
    };
  });

  currentIdx = 0;
  score = 0;
  answersLog = [];
  $('qTotal').textContent = totalQ.toString();
  showScreen('quiz');
  renderQuestion();
}

function updateMappingStatus() {
  const mapped = Object.keys(nameToFile).length;
  const playable = Math.min(mapped > 0 ? mapped : TINIPINGS.length, TOTAL_QUESTIONS);
  const startTotal = $('startTotal');
  if (startTotal) startTotal.textContent = playable;
}

// ====== 문제 렌더 ======
function renderQuestion() {
  locked = false;
  const totalQ = questions.length;
  const q = questions[currentIdx];
  $('qNum').textContent = (currentIdx + 1).toString();
  $('scoreNow').textContent = score.toString();
  $('progressFill').style.width = ((currentIdx) / totalQ * 100) + '%';

  // 이미지
  const img = $('charImg');
  const fb = $('imageFallback');
  fb.style.setProperty('--c1', q.answer.c1);
  fb.style.setProperty('--c2', q.answer.c2);
  fb.textContent = '?';
  fb.style.display = 'flex';
  img.style.display = 'none';
  img.alt = '티니핑 이미지';

  // 이미지 로딩 시도: mapping.json에 등록된 파일 우선, 없으면 이름.png/jpg 시도
  const mappedFile = nameToFile[q.answer.name];
  const candidates = [];
  if (mappedFile) candidates.push(`./images/${encodeURIComponent(mappedFile)}`);
  candidates.push(`./images/${encodeURIComponent(q.answer.name)}.png`);
  candidates.push(`./images/${encodeURIComponent(q.answer.name)}.jpg`);
  candidates.push(`./images/${encodeURIComponent(q.answer.name)}.webp`);

  let candIdx = 0;
  const tryNext = () => {
    if (candIdx >= candidates.length) {
      img.style.display = 'none';
      fb.style.display = 'flex';
      return;
    }
    img.src = candidates[candIdx++];
  };
  img.onload = () => {
    fb.style.display = 'none';
    img.style.display = 'block';
  };
  img.onerror = tryNext;
  tryNext();

  // 보기 버튼
  const grid = $('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.type = 'button';
    btn.textContent = opt.name;
    btn.addEventListener('click', () => onPick(btn, opt));
    grid.appendChild(btn);
  });

  $('answerReveal').textContent = '';
  $('answerReveal').className = 'answer-reveal';
  $('nextBtnWrap').innerHTML = '';
}

// ====== 답 선택 ======
function onPick(btn, opt) {
  if (locked) return;
  locked = true;
  const q = questions[currentIdx];
  const isCorrect = opt.name === q.answer.name;
  answersLog.push({
    name: q.answer.name,
    picked: opt.name,
    correct: isCorrect,
  });

  // 모든 버튼 비활성
  const allBtns = document.querySelectorAll('#optionsGrid .option-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === q.answer.name) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });

  // 피드백
  if (isCorrect) {
    score++;
    $('scoreNow').textContent = score.toString();
    showFeedback(true);
    playCorrect();
    vibrate(40);
    fireConfetti();
    $('answerReveal').textContent = `정답! ${q.answer.name} 🎉`;
    $('answerReveal').classList.add('correct');
  } else {
    showFeedback(false);
    playWrong();
    vibrate([60, 40, 60]);
    $('answerReveal').textContent = `정답은 ${q.answer.name} 이에요`;
    $('answerReveal').classList.add('wrong');
  }

  // 자동 다음 이동 (정답 1.6초, 오답 2.5초)
  const delay = isCorrect ? 1600 : 2500;
  setTimeout(goNext, delay);
}

function goNext() {
  if (currentIdx + 1 < questions.length) {
    currentIdx++;
    renderQuestion();
  } else {
    showResult();
  }
}

// ====== 피드백 오버레이 ======
function showFeedback(correct) {
  let el = document.querySelector('.feedback');
  if (!el) {
    el = document.createElement('div');
    el.className = 'feedback';
    const bubble = document.createElement('div');
    bubble.className = 'feedback-bubble';
    el.appendChild(bubble);
    document.body.appendChild(el);
  }
  const bubble = el.querySelector('.feedback-bubble');
  el.classList.remove('correct', 'wrong', 'show');
  void el.offsetWidth; // reflow
  el.classList.add(correct ? 'correct' : 'wrong', 'show');
  bubble.textContent = correct ? '⭕' : '❌';
  setTimeout(() => el.classList.remove('show'), 900);
}

// ====== Confetti ======
const confettiCanvas = $('confetti-canvas');
const cctx = confettiCanvas.getContext('2d');
function resizeCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let confettiPieces = [];
function fireConfetti() {
  const colors = ['#ff5fa2', '#ffae34', '#ffd166', '#7ed957', '#6ec8ff', '#b675ff'];
  for (let i = 0; i < 60; i++) {
    confettiPieces.push({
      x: window.innerWidth / 2 + (Math.random() - 0.5) * 80,
      y: window.innerHeight / 2 - 40,
      vx: (Math.random() - 0.5) * 8,
      vy: -Math.random() * 8 - 4,
      g: 0.25,
      size: 6 + Math.random() * 6,
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.3,
      color: colors[i % colors.length],
      life: 90 + Math.random() * 30,
    });
  }
  if (!confettiRunning) animateConfetti();
}
let confettiRunning = false;
function animateConfetti() {
  confettiRunning = true;
  cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiPieces = confettiPieces.filter(p => p.life > 0 && p.y < window.innerHeight + 40);
  confettiPieces.forEach(p => {
    p.vy += p.g;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    p.life--;
    cctx.save();
    cctx.translate(p.x, p.y);
    cctx.rotate(p.rot);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    cctx.restore();
  });
  if (confettiPieces.length > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    confettiRunning = false;
    cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

// ====== 결과 화면 ======
function showResult() {
  $('progressFill').style.width = '100%';
  $('finalScore').textContent = score.toString();
  $('finalTotal').textContent = questions.length.toString();

  // 점수 구간별 하츄핑 응원 메시지
  let msg;
  if (score === 30)      msg = '완벽 그 자체야, 30점 만점이라니 나까지 너무 기쁘고 자랑스러워츄! 🌟';
  else if (score === 29) msg = '아쉽게 하나 놓쳤지만 거의 완벽했어, 정말 훌륭하고 대단해츄! 💕';
  else if (score === 28) msg = '28점도 너무 멋진 점수니까 오늘만큼은 스스로를 듬뿍 칭찬해줘츄! ✨';
  else if (score >= 20)  msg = '지금도 충분히 잘하고 있으니까, 아쉬운 부분만 조금 더 채워보자츄! 🌷';
  else if (score >= 10)  msg = '이번엔 살짝 어려웠을 뿐이야, 조금 더 연습하면 다음엔 분명 쑥쑥 오를 거야츄! 💪';
  else                   msg = '점수보다 끝까지 노력한 예쁜 마음이 더 중요한 거야, 나랑 같이 차근차근 다시 해보자츄! 🌈';

  $('hatchuMessage').textContent = msg;
  $('reviewList').style.display = 'none';
  $('reviewList').innerHTML = '';

  // 결과 화면 진입 시 팡파레
  setTimeout(() => {
    playFanfare();
    // 큰 confetti
    for (let n = 0; n < 3; n++) {
      setTimeout(fireConfetti, n * 200);
    }
  }, 200);

  showScreen('result');
}

function renderReview() {
  const list = $('reviewList');
  if (list.children.length > 0) {
    list.style.display = (list.style.display === 'none') ? 'block' : 'none';
    return;
  }
  answersLog.forEach((a, i) => {
    const row = document.createElement('div');
    row.className = 'review-row';
    row.innerHTML = `
      <div class="num">${i+1}</div>
      <div class="mark">${a.correct ? '⭕' : '❌'}</div>
      <div class="name">${a.name}</div>
      <div class="yours ${a.correct ? '' : 'wrong'}">${a.correct ? '정답!' : '내 답: '+a.picked}</div>
    `;
    list.appendChild(row);
  });
  list.style.display = 'block';
}

// ====== 이벤트 ======
$('startBtn').addEventListener('click', () => { playClick(); startGame(); });
$('restartBtn').addEventListener('click', () => { playClick(); startGame(); });
$('showReviewBtn').addEventListener('click', () => { playClick(); renderReview(); });

// iOS에서 첫 터치 시 audio context 활성화
document.addEventListener('touchstart', () => { getCtx(); }, { once: true, passive: true });
document.addEventListener('click', () => { getCtx(); }, { once: true });

// 더블탭 줌 방지 (모바일 게임용)
let lastTouchEnd = 0;
document.addEventListener('touchend', function (e) {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

</script>
